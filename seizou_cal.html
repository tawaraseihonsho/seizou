    body { background: #09090b; color: #e4e4e7; font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; }

<body>
<div id="root"></div>

<!-- 読み込み中・エラー表示（真っ暗防止） -->
<script>
  // 4秒たっても画面が描画されなければ、原因を画面に出す（真っ暗のまま終わらせない）
  window.__seizouLoaded = false;
  window.addEventListener("error", function (e) {
    if (window.__seizouLoaded) return;
    var r = document.getElementById("root");
    if (r && !r.firstChild) {
      r.innerHTML = '<div style="padding:24px;color:#e4e4e7;font-family:sans-serif;line-height:1.8">'
        + '<div style="font-size:16px;font-weight:700;margin-bottom:8px">読み込みでエラーが発生しました</div>'
        + '<div style="font-size:13px;color:#a1a1aa">ページを再読み込みしてください。改善しない場合は、通信環境を変えるか別のブラウザでお試しください。</div>'
        + '<div style="font-size:11px;color:#52525b;margin-top:12px;word-break:break-all">' + (e && e.message ? e.message : '') + '</div>'
        + '</div>';
    }
  });
  setTimeout(function () {
    var r = document.getElementById("root");
    if (r && !r.firstChild && !window.__seizouLoaded) {
      r.innerHTML = '<div style="padding:24px;color:#e4e4e7;font-family:sans-serif;line-height:1.8">'
        + '<div style="font-size:16px;font-weight:700;margin-bottom:8px">読み込みに時間がかかっています</div>'
        + '<div style="font-size:13px;color:#a1a1aa">通信環境を確認して、ページを再読み込みしてください。</div>'
        + '</div>';
    }
  }, 4000);
</script>
