function useGAS(jobs, setJobs) {
  const [syncing, setSyncing] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [syncError, setSyncError] = useState(null);
  const autoSaveTimer = useRef(null);
  const isFirstLoad = useRef(true);

  const normalizeDate = (val) => {
    if (!val) return "";
    const s = String(val).trim();
    if (/^[0-9]{4}-[0-9]{2}-[0-9]{2}$/.test(s)) return s;
    try {
      const d = new Date(s);
      if (!isNaN(d.getTime())) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      }
    } catch(e) {}
    return s;
  };

  const normalizeJob = (job) => ({
    ...job,
    pickupDate: normalizeDate(job.pickupDate),
    deliveryDate: normalizeDate(job.deliveryDate),
    machines: Array.isArray(job.machines) ? job.machines : (job.machines ? String(job.machines).split(",").filter(v=>v) : []),
    workers: Array.isArray(job.workers) ? job.workers : (job.workers ? String(job.workers).split(",").filter(v=>v) : []),
    status: job.status || "未着手",
  });

  const loadFromGAS = async () => {
    setSyncing(true); setSyncError(null);
    try {
      const res = await fetch(GAS_URL + "?action=load");
      const data = await res.json();
      if (data.jobs && Array.isArray(data.jobs) && data.jobs.length > 0) {
        const seen = new Set();
        const unique = data.jobs.map(normalizeJob).filter(j => { if (seen.has(j.id)) return false; seen.add(j.id); return true; });
        isFirstLoad.current = true;
        setJobs(unique);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(unique));
        setLastSync(new Date().toLocaleTimeString("ja-JP"));
      } else { setSyncError("GASにデータがありません"); }
    } catch(e) { setSyncError("読込失敗"); }
    setSyncing(false);
  };

  const saveToGAS = async (newJobs) => {
    setSyncing(true); setSyncError(null);
    try {
      const seen = new Set();
      const unique = newJobs.filter(j => { if (seen.has(String(j.id))) return false; seen.add(String(j.id)); return true; });
      const res = await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "save", jobs: unique }) });
      const data = await res.json();
      if (data.success) { setLastSync(new Date().toLocaleTimeString("ja-JP")); } else { setSyncError("保存失敗: " + (data.error || "")); }
    } catch(e) { setSyncError("保存失敗"); }
    setSyncing(false);
  };

  useEffect(() => { loadFromGAS(); }, []);

  useEffect(() => {
    if (isFirstLoad.current) { isFirstLoad.current = false; return; }
    if (autoSaveTimer.current) clearTimeout(autoSaveTimer.current);
    autoSaveTimer.current = setTimeout(() => { saveToGAS(jobs); }, 3000);
    return () => clearTimeout(autoSaveTimer.current);
  }, [jobs]);

  return { syncing, lastSync, syncError, loadFromGAS, saveToGAS };
}

const SCH_START = 8.5, SCH_END = 17, SCH_TOTAL = SCH_END - SCH_START, SCH_ROW_H = 58, SCH_ROW_GAP = 4;

function schToPercent(hour) { return ((hour - SCH_START) / SCH_TOTAL) * 100; }
function schFmtHour(h) { const hh=Math.floor(h); const mm=Math.round((h%1)*60); return `${hh}:${mm===0?"00":mm}`; }
function assignRows(jobs) {
  const sorted = [...jobs].sort((a,b)=>a.startHour-b.startHour);
  const rows = [], result = [];
  for (const job of sorted) {
    let placed = false;
    for (let r=0; r<rows.length; r++) { if (rows[r].startHour + rows[r].duration <= job.startHour) { rows[r] = job; result.push({...job,row:r}); placed=true; break; } }
    if (!placed) { rows.push(job); result.push({...job,row:rows.length-1}); }
  }
  return { items:result, rowCount:Math.max(1,rows.length) };
}

function useClientColors(jobs) {
  const [colorMap, setColorMap] = useState(() => { try { return JSON.parse(localStorage.getItem(CLIENT_COLOR_KEY)||"{}"); } catch { return {}; } });
  useEffect(() => {
    const clients = [...new Set(jobs.map(j=>j.client).filter(Boolean))];
    let updated = {...colorMap}, changed = false;
    clients.forEach(c => { if (!updated[c] && updated[c] !== 0) { updated[c] = Object.keys(updated).length % CLIENT_COLORS.length; changed = true; } });
    if (changed) { setColorMap(updated); localStorage.setItem(CLIENT_COLOR_KEY, JSON.stringify(updated)); }
  }, [jobs]);
  const getColor = (client) => CLIENT_COLORS[colorMap[client] ?? 0];
  return { colorMap, getColor };
}

          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>

          <textarea value={editNote} onChange={e=>setEditNote(e.target.value)} onBlur={()=>onUpdateNote(job.id,editNote)} placeholder="備考を入力..." rows={3}
            style={{width:"100%",background:"#111113",border:"1px solid #3f3f46",borderRadius:9,padding:"10px 12px",color:"#e4e4e7",fontSize:13,outline:"none",resize:"none",fontFamily:"inherit"}} />
        </div>
        <div style={{background:"#18181b",borderRadius:14,padding:16,border:"1px solid #27272a"}}>
          {!confirmDelete?<button onClick={()=>setConfirmDelete(true)} style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid #3f3f46",background:"transparent",color:"#71717a",fontSize:13,cursor:"pointer"}}>🗑 この案件を削除</button>
          :<div><div style={{fontSize:13,color:"#fca5a5",marginBottom:10,textAlign:"center"}}>本当に削除しますか？</div><div style={{display:"flex",gap:10}}><button onClick={()=>setConfirmDelete(false)} style={{flex:1,padding:"11px",borderRadius:10,border:"1px solid #3f3f46",background:"transparent",color:"#71717a",fontSize:13,cursor:"pointer"}}>キャンセル</button><button onClick={()=>{onDelete(job.id);onClose();}} style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:"#7f1d1d",color:"#fca5a5",fontSize:13,fontWeight:700,cursor:"pointer"}}>削除する</button></div></div>}
        </div>
      </div>
    </div>
  );
}

// ── 業務日誌コンポーネント ──
function NippoTab({ nippoRecords, setNippoRecords, nippoHistView, setNippoHistView, nippoSaved, setNippoSaved, nippoTodayJobs, jobs, getColor }) {
  const CLIENTS_PRESET = [...new Set(jobs.map(j=>j.client).filter(Boolean))];
  const nippoDate2 = getNippoToday();
  const nippoCurrent2 = nippoRecords[nippoDate2] || { decisions:'', progress:'', tags:[] };
  const [histFilter, setHistFilter] = useState('');
  const [histTagFilter, setHistTagFilter] = useState('');

  const updateNippoField = (field, val) => {
    setNippoRecords(prev=>({ ...prev, [nippoDate2]: { ...(prev[nippoDate2]||{}), [field]: val } }));
    setNippoSaved(false);
  };
  const toggleNippoTag = (tag) => {
    const cur = nippoCurrent2.tags || [];
    updateNippoField('tags', cur.includes(tag) ? cur.filter(t=>t!==tag) : [...cur, tag]);
  };
  const saveNippoLocal = () => {
    const updated = { ...nippoRecords, [nippoDate2]: { ...(nippoRecords[nippoDate2]||{}), savedAt: new Date().toISOString() } };
    setNippoRecords(updated);
    try{ localStorage.setItem(NIPPO_STORAGE, JSON.stringify(updated)); }catch{}
    setNippoSaved(true);
  };
  const allHistTags = [...new Set(Object.values(nippoRecords).flatMap(r=>r.tags||[]))];
  const histDates = Object.keys(nippoRecords)
    .filter(d=>{
      const r=nippoRecords[d];
      if(!r.savedAt) return false;
      const text=[r.decisions||'',r.progress||'',...(r.tags||[])].join(' ').toLowerCase();
      return (!histFilter||text.includes(histFilter.toLowerCase()))&&(!histTagFilter||(r.tags||[]).includes(histTagFilter));
    }).sort((a,b)=>b.localeCompare(a));

  return(
    <div style={{display:"flex",flexDirection:"column",gap:0}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{fontSize:12,color:"#71717a"}}>{fmtNippoDate(nippoDate2)}</div>
          <div style={{fontSize:16,fontWeight:700,color:"#fafafa"}}>業務日誌</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          {[["記入",false],["履歴",true]].map(([label,hist])=>(
            <button key={label} onClick={()=>setNippoHistView(hist)}
              style={{background:nippoHistView===hist?"#27272a":"transparent",border:"1px solid",borderColor:nippoHistView===hist?"#52525b":"#3f3f46",color:nippoHistView===hist?"#e4e4e7":"#71717a",borderRadius:8,padding:"6px 14px",fontSize:13,cursor:"pointer"}}>{label}</button>
          ))}
        </div>
      </div>

      {!nippoHistView ? (
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{background:"#18181b",border:"1px solid #27272a",borderRadius:12,padding:"12px 14px"}}>
            <div style={{fontSize:11,color:"#f97316",fontWeight:700,marginBottom:10}}>🏷 今日の取引先・案件タグ</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {CLIENTS_PRESET.map(c=>{
                const active=(nippoCurrent2.tags||[]).includes(c);
                const cc=getColor(c);
                return(
                  <button key={c} onClick={()=>toggleNippoTag(c)}
                    style={{background:active?cc.bg:"#111113",border:`1px solid ${active?cc.border:"#3f3f46"}`,color:active?cc.text:"#71717a",borderRadius:20,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:active?700:400}}>
                    {active?"✓ ":""}{c}
                  </button>
                );
              })}
            </div>
            <input id="ctag" placeholder="その他タグを追加（Enterで確定）..."
              style={{width:"100%",background:"#111113",border:"1px solid #3f3f46",borderRadius:8,padding:"7px 10px",color:"#e4e4e7",fontSize:13,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}
              onKeyDown={e=>{if(e.key==="Enter"){const v=e.target.value.trim();if(v&&!(nippoCurrent2.tags||[]).includes(v))updateNippoField("tags",[...(nippoCurrent2.tags||[]),v]);e.target.value="";}}}
            />
            {(nippoCurrent2.tags||[]).length>0&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
                {(nippoCurrent2.tags||[]).map(t=>{const cc=getColor(t);return(
                  <span key={t} style={{background:cc.bg,border:`1px solid ${cc.border}`,color:cc.text,borderRadius:20,padding:"3px 10px",fontSize:12,display:"flex",alignItems:"center",gap:4}}>
                    {t}<span onClick={()=>toggleNippoTag(t)} style={{cursor:"pointer",color:"#aaa",fontSize:14}}>×</span>
                  </span>
                );})}
              </div>
            )}
          </div>

          <div style={{background:"#18181b",border:"1px solid #f9731630",borderRadius:12,padding:"12px 14px"}}>
            <div style={{fontSize:11,color:"#f97316",fontWeight:700,marginBottom:8}}>✅ 今日の判断・決定事項</div>
            <textarea
              value={nippoCurrent2.decisions||""}
              onChange={e=>updateNippoField("decisions",e.target.value)}
              placeholder={"例：\n・kobecco 数量間違い → 確認済み\n・リファ2丁で進めることに決定\n・招集通知25帯\n・ヤマダの次にA5の16p折り → OK"}
              style={{width:"100%",minHeight:130,background:"#111113",border:"1px solid #27272a",borderRadius:10,padding:"12px 14px",color:"#e4e4e7",fontSize:14,lineHeight:1.8,resize:"vertical",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}
              onFocus={e=>e.target.style.borderColor="#f97316"}
              onBlur={e=>e.target.style.borderColor="#27272a"}
            />
          </div>

          <div style={{background:"#18181b",border:"1px solid #27272a",borderRadius:12,padding:"12px 14px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{fontSize:11,color:"#a1a1aa",fontWeight:700}}>📋 作業進捗・メモ</div>
              {nippoTodayJobs.length>0&&(
                <button onClick={()=>{const text=nippoTodayJobs.map(j=>`・${j.product}（${j.client}）→ ${j.status}`).join("\n");updateNippoField("progress",text);}}
                  style={{background:"#1c1917",border:"1px solid #44403c",color:"#a8a29e",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>スケジュールから反映</button>
              )}
            </div>
            <textarea
              value={nippoCurrent2.progress||""}
              onChange={e=>updateNippoField("progress",e.target.value)}
              placeholder="作業の進み具合、気づき、申し送り事項など..."
              style={{width:"100%",minHeight:80,background:"#111113",border:"1px solid #27272a",borderRadius:10,padding:"12px 14px",color:"#e4e4e7",fontSize:14,lineHeight:1.7,resize:"vertical",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}
              onFocus={e=>e.target.style.borderColor="#a1a1aa"}
              onBlur={e=>e.target.style.borderColor="#27272a"}
            />
          </div>

          <button onClick={saveNippoLocal}
            style={{width:"100%",background:nippoSaved?"#052e16":"linear-gradient(135deg,#f97316,#ea580c)",border:nippoSaved?"1px solid #166534":"none",color:nippoSaved?"#4ade80":"#fff",padding:"13px",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
            {nippoSaved?"✓ 保存済み":"💾 保存する"}
          </button>
        </div>
      ) : (
        <div>
          <div style={{background:"#18181b",border:"1px solid #27272a",borderRadius:12,padding:"10px 12px",marginBottom:14,display:"flex",flexDirection:"column",gap:8}}>
            <input value={histFilter} onChange={e=>setHistFilter(e.target.value)} placeholder="キーワード検索..."
              style={{width:"100%",background:"#111113",border:"1px solid #3f3f46",borderRadius:8,padding:"7px 10px",color:"#e4e4e7",fontSize:13,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
            {allHistTags.length>0&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                <button onClick={()=>setHistTagFilter("")}
                  style={{background:histTagFilter===''?"#27272a":"transparent",border:"1px solid",borderColor:histTagFilter===''?"#52525b":"#3f3f46",color:histTagFilter===''?"#e4e4e7":"#71717a",borderRadius:20,padding:"3px 10px",fontSize:11,cursor:"pointer"}}>すべて</button>
                {allHistTags.map(t=>{const cc=getColor(t);return(
                  <button key={t} onClick={()=>setHistTagFilter(histTagFilter===t?"":t)}
                    style={{background:histTagFilter===t?cc.bg:"transparent",border:`1px solid ${histTagFilter===t?cc.border:"#3f3f46"}`,color:histTagFilter===t?cc.text:"#71717a",borderRadius:20,padding:"3px 10px",fontSize:11,cursor:"pointer"}}>{t}</button>
                );})}
              </div>
            )}
          </div>
          {histDates.length===0
            ?<div style={{color:"#52525b",fontSize:14,textAlign:"center",padding:"60px 0"}}>記録がありません</div>
            :histDates.map(date=>{const r=nippoRecords[date];return(
              <div key={date} style={{background:"#18181b",border:"1px solid #27272a",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{fontSize:12,color:"#71717a"}}>{fmtNippoDate(date)}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,justifyContent:"flex-end"}}>
                    {(r.tags||[]).map(t=>{const cc=getColor(t);return(<span key={t} style={{background:cc.bg,border:`1px solid ${cc.border}`,color:cc.text,borderRadius:10,padding:"1px 8px",fontSize:10}}>{t}</span>);})}
                  </div>
                </div>
                {r.decisions&&<div style={{marginBottom:8}}><div style={{fontSize:10,color:"#f97316",fontWeight:700,marginBottom:4}}>✅ 判断・決定事項</div><div style={{fontSize:13,color:"#d4d4d8",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{r.decisions}</div></div>}
                {r.progress&&<div><div style={{fontSize:10,color:"#a1a1aa",fontWeight:700,marginBottom:4}}>📋 作業進捗</div><div style={{fontSize:13,color:"#d4d4d8",lineHeight:1.65,whiteSpace:"pre-wrap"}}>{r.progress}</div></div>}
              </div>
            );})}
        </div>
      )}
    </div>
  );
}

function App() {
  const [jobs, setJobs] = useState(()=>{ try{ const s=localStorage.getItem(STORAGE_KEY); return s?JSON.parse(s):INITIAL_DATA; }catch{ return INITIAL_DATA; } });
  const [tab, setTab] = useState(0);
  const [form, setForm] = useState(emptyForm);
  const [selectedDate, setSelectedDate] = useState(null);
  const [detailJob, setDetailJob] = useState(null);
  const [calMode, setCalMode] = useState("delivery");
  const [showAiImport, setShowAiImport] = useState(false);
  const [quoteSelected, setQuoteSelected] = useState(null);
  const [quoteForm, setQuoteForm] = useState({});
  const [quoteFilter, setQuoteFilter] = useState("すべて");
  const [scheduleDate, setScheduleDate] = useState(today);
  const [scheduleData, setScheduleData] = useState({});
  const [schDragging, setSchDragging] = useState(null);
  const [apiKey, setApiKey] = useState(()=>localStorage.getItem("anthropic_api_key")||"");
  const now = new Date();
  const [calYear, setCalYear] = useState(now.getFullYear());
  const [calMonth, setCalMonth] = useState(now.getMonth());
  const { getColor } = useClientColors(jobs);

  const [nippoRecords, setNippoRecords] = useState(()=>{ try{ const s=localStorage.getItem(NIPPO_STORAGE); return s?JSON.parse(s):{}; }catch{ return {}; } });
  const [nippoHistView, setNippoHistView] = useState(false);
  const [nippoSaved, setNippoSaved] = useState(false);
  const nippoDate = getNippoToday();
  const nippoTodayJobs = (()=>{ const sched=scheduleData[nippoDate]||[]; return sched.map(s=>{ const j=jobs.find(jj=>String(jj.id)===String(s.id)); return j?{...j,startHour:s.startHour,duration:s.duration}:null; }).filter(Boolean).sort((a,b)=>a.startHour-b.startHour); })();

  const saveNippo = () => {
    const nippoDate2 = getNippoToday();
    const updated = { ...nippoRecords, [nippoDate2]: { ...(nippoRecords[nippoDate2]||{}), savedAt: new Date().toISOString() } };
    setNippoRecords(updated);
    try{ localStorage.setItem(NIPPO_STORAGE, JSON.stringify(updated)); }catch{}
    setNippoSaved(true);
  };

  const { syncing, lastSync, syncError, loadFromGAS, saveToGAS } = useGAS(jobs, setJobs);

  useEffect(()=>{ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(jobs)); }catch{} },[jobs]);

  const days = getMonthDays(calYear, calMonth);
  const firstDow = new Date(calYear, calMonth, 1).getDay();

  const cycleStatus = (id,e) => {
    e&&e.stopPropagation();
    setJobs(prev=>prev.map(j=>j.id===id?{...j,status:STATUS_LIST[(STATUS_LIST.indexOf(j.status)+1)%3]}:j));
    if(detailJob?.id===id) setDetailJob(prev=>({...prev,status:STATUS_LIST[(STATUS_LIST.indexOf(prev.status)+1)%3]}));
  };
  const updateField=(id,field,value)=>{ setJobs(prev=>prev.map(j=>j.id===id?{...j,[field]:value}:j)); if(detailJob?.id===id) setDetailJob(prev=>({...prev,[field]:value})); };
  const deleteJob=(id)=>setJobs(prev=>prev.filter(j=>j.id!==id));
  const handleAdd=()=>{ if(!form.client||!form.product||!form.pickupDate) return; setJobs(prev=>[{...form,id:Date.now()},...prev]); setForm(emptyForm); setTab(0); };
  const handleAiImport=(newJobs)=>{ const toAdd=newJobs.map(j=>({...emptyForm,...j,id:Date.now()+Math.random(),status:"未着手"})); setJobs(prev=>[...toAdd,...prev]); setTab(1); };
  const jobsForDate=(date)=>jobs.filter(j=>(calMode==="pickup"&&j.pickupDate===date)||(calMode==="delivery"&&j.deliveryDate===date));
  const dayJobs=selectedDate?jobsForDate(selectedDate):[];
  const machineLoad=MACHINES.map(m=>({name:m,count:jobs.filter(j=>j.machines.includes(m)&&j.status!=="完了").length}));
  const workerLoad=WORKERS.map(w=>({name:w,jobs:jobs.filter(j=>j.workers.includes(w)&&j.status!=="完了")}));

  const JobCard=({job})=>{
    const sc=STATUS_STYLE[job.status], cc=getColor(job.client), overdue=job.deliveryDate&&job.deliveryDate<today&&job.status!=="完了";
    return(
      <div onClick={()=>setDetailJob({...job})} className="fade-in" style={{background:"#18181b",borderRadius:14,border:`1px solid ${overdue?"#7f1d1d":cc.border}`,padding:"14px",cursor:"pointer",borderLeft:`3px solid ${cc.dot}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div style={{flex:1,paddingRight:8}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
              {overdue&&<span style={{fontSize:9,background:"#7f1d1d",color:"#fca5a5",borderRadius:4,padding:"2px 5px"}}>納品超過</span>}
              <span style={{fontSize:14,fontWeight:700,color:"#fafafa"}}>{job.product}</span>
            </div>
            <div style={{fontSize:11,color:cc.text,display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:cc.dot,display:"inline-block"}}/>{job.client}　📦 {job.qty}{job.processType&&`　✂ ${job.processType}`}
            </div>
          </div>
          <div style={{background:sc.bg,border:`1px solid ${sc.border}`,color:sc.text,borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600,display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap",flexShrink:0}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:sc.dot,display:"inline-block"}}/>{job.status}
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
          {job.pickupDate&&<span style={{background:"#0c1a2e",border:"1px solid #1e3a5f",color:"#7dd3fc",borderRadius:6,padding:"2px 8px",fontSize:11}}>🚚 引取 {fmtDate(job.pickupDate)}</span>}
          {job.deliveryDate&&<span style={{background:"#052e16",border:"1px solid #166534",color:"#4ade80",borderRadius:6,padding:"2px 8px",fontSize:11}}>📬 納品 {fmtDate(job.deliveryDate)}</span>}
        </div>
        {job.note&&<div style={{fontSize:11,color:"#71717a"}}>📝 {job.note}</div>}
      </div>
    );
  };

  return(
    <div style={{fontFamily:"inherit",background:"#09090b",minHeight:"100vh",color:"#e4e4e7",maxWidth:900,margin:"0 auto",paddingBottom:80}}>
      {showAiImport&&<AiImportModal onClose={()=>setShowAiImport(false)} onImport={handleAiImport} apiKey={apiKey} />}
      {detailJob&&<DetailModal job={detailJob} onClose={()=>setDetailJob(null)} onCycleStatus={cycleStatus} onUpdateMachines={(id,val)=>updateField(id,"machines",val)} onUpdateWorkers={(id,val)=>updateField(id,"workers",val)} onUpdateNote={(id,val)=>updateField(id,"note",val)} onUpdateDate={(id,field,val)=>updateField(id,field,val)} onUpdateField={(id,field,val)=>updateField(id,field,val)} onDelete={deleteJob} getColor={getColor} />}

      <div style={{background:"#18181b",borderBottom:"1px solid #27272a",padding:"14px 16px",position:"sticky",top:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,flexShrink:0,background:"linear-gradient(135deg,#f97316,#ea580c)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏭</div>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:"#fafafa"}}>段取り管理</div>
            <div style={{fontSize:10,color:syncError?"#f87171":syncing?"#f59e0b":"#52525b"}}>{syncing?"⟳ 自動同期中...":syncError?"⚠ "+syncError:lastSync?"✓ "+lastSync+" 自動保存済":"起動中..."}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <button onClick={()=>saveToGAS(jobs)} disabled={syncing} style={{background:"#422006",border:"1px solid #92400e",color:"#fbbf24",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>📤保存</button>
          <button onClick={loadFromGAS} disabled={syncing} style={{background:"#0c1a2e",border:"1px solid #1e3a5f",color:"#60a5fa",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>📥読込</button>
          {STATUS_LIST.map(s=><div key={s} style={{textAlign:"center"}}><div style={{fontSize:14,fontWeight:700,color:STATUS_STYLE[s].text}}>{jobs.filter(j=>j.status===s).length}</div><div style={{fontSize:9,color:"#52525b"}}>{s}</div></div>)}
        </div>
      </div>

      <div style={{padding:"14px 14px 0"}}>

        {/* カレンダー */}
        {tab===0&&(
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <button onClick={()=>{let m=calMonth-1,y=calYear;if(m<0){m=11;y--;}setCalMonth(m);setCalYear(y);}} style={{background:"#27272a",border:"none",color:"#e4e4e7",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:16}}>‹</button>
              <div style={{fontSize:15,fontWeight:700,color:"#fafafa"}}>{calYear}年 {calMonth+1}月</div>
              <button onClick={()=>{let m=calMonth+1,y=calYear;if(m>11){m=0;y++;}setCalMonth(m);setCalYear(y);}} style={{background:"#27272a",border:"none",color:"#e4e4e7",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:16}}>›</button>
            </div>
            <div style={{display:"flex",background:"#18181b",borderRadius:10,padding:4,marginBottom:10,border:"1px solid #27272a"}}>
              {[{key:"pickup",label:"🚚 引き取り日",color:"#7dd3fc"},{key:"delivery",label:"📬 納品日",color:"#4ade80"}].map(opt=>(
                <button key={opt.key} onClick={()=>{setCalMode(opt.key);setSelectedDate(null);}} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:calMode===opt.key?"#27272a":"transparent",color:calMode===opt.key?opt.color:"#52525b",fontSize:12,fontWeight:calMode===opt.key?700:400,cursor:"pointer"}}>{opt.label}</button>
              ))}

            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
              {["日","月","火","水","木","金","土"].map((d,i)=><div key={d} style={{textAlign:"center",fontSize:11,color:i===0?"#f87171":i===6?"#7dd3fc":"#52525b",padding:"4px 0"}}>{d}</div>)}

                const isToday=date===today,dow=new Date(date).getDay(),accentColor=calMode==="pickup"?"#38bdf8":"#4ade80";
                const hasPickup=jobs.some(j=>j.pickupDate===date),hasDelivery=jobs.some(j=>j.deliveryDate===date);

                  <div key={date} onClick={()=>setSelectedDate(isSelected?null:date)} style={{background:isToday?"#1c1917":"#18181b",border:`1px solid ${isToday?"#f97316":isSelected?accentColor:"#27272a"}`,borderRadius:10,padding:"6px 4px 8px",cursor:"pointer",minHeight:64,display:"flex",flexDirection:"column",alignItems:"center"}}>
                    <div style={{fontSize:12,fontWeight:isToday?800:400,textAlign:"center",marginBottom:5,color:isToday?"#f97316":dow===0?"#f87171":dow===6?"#7dd3fc":"#a1a1aa"}}>{new Date(date).getDate()}</div>

                      {hasPickup&&<div style={{display:"flex",gap:2}}>{Array(Math.min(pickupCount,3)).fill(null).map((_,i)=><span key={i} style={{width:7,height:7,borderRadius:"50%",background:"#38bdf8",display:"inline-block"}}/>)}</div>}
                      {hasDelivery&&<div style={{display:"flex",gap:2}}>{Array(Math.min(deliveryCount,3)).fill(null).map((_,i)=><span key={i} style={{width:7,height:7,borderRadius:"50%",background:"#4ade80",display:"inline-block"}}/>)}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
            {selectedDate&&(
              <div style={{marginTop:18}}>
                <div style={{fontSize:13,fontWeight:700,color:"#a1a1aa",marginBottom:10}}>{calMode==="pickup"?"🚚 引き取り":"📬 納品"} {fmtDate(selectedDate)}<span style={{marginLeft:8,fontSize:11,color:"#52525b"}}>{dayJobs.length}件</span></div>
                {dayJobs.length===0?<div style={{textAlign:"center",color:"#3f3f46",padding:24,border:"1px dashed #27272a",borderRadius:12,fontSize:13}}>この日の案件はありません</div>:<div style={{display:"flex",flexDirection:"column",gap:10}}>{dayJobs.map(job=><JobCard key={job.id} job={job}/>)}</div>}
              </div>
            )}
          </div>
        )}

        {/* スケジュール */}
        {tab===1&&(()=>{
          const dateSchedule=scheduleData[scheduleDate]||[];
          const scheduledJobs=jobs.map(j=>{const s=dateSchedule.find(d=>String(d.id)===String(j.id));return s?{...j,startHour:s.startHour,duration:s.duration}:null;}).filter(Boolean);
          const unscheduledJobs=jobs.filter(j=>!dateSchedule.find(d=>String(d.id)===String(j.id))&&j.status!=="完了"&&(!j.deliveryDate||j.deliveryDate>=scheduleDate)&&(!j.pickupDate||j.pickupDate<=scheduleDate));
          const {items,rowCount}=assignRows(scheduledJobs);
          const tlHeight=rowCount*SCH_ROW_H+(rowCount-1)*SCH_ROW_GAP+16;
          const handleSchDrop=(e)=>{if(!schDragging)return;e.preventDefault();const el=document.getElementById("sch-timeline");if(!el)return;const rect=el.getBoundingClientRect();const x=e.clientX-rect.left;const pct=Math.max(0,Math.min(1,x/rect.width));const startHour=Math.max(SCH_START,Math.min(SCH_END-1,Math.round((SCH_START+pct*SCH_TOTAL)*2)/2));const duration=schDragging.job.duration||1;setScheduleData(prev=>{const existing=prev[scheduleDate]||[];const filtered=existing.filter(d=>String(d.id)!==String(schDragging.job.id));return{...prev,[scheduleDate]:[...filtered,{id:schDragging.job.id,startHour,duration}]};});setSchDragging(null);};
          const removeSchJob=(id)=>setScheduleData(prev=>({...prev,[scheduleDate]:(prev[scheduleDate]||[]).filter(d=>String(d.id)!==String(id))}));
          const changeSchDuration=(id,delta)=>setScheduleData(prev=>({...prev,[scheduleDate]:(prev[scheduleDate]||[]).map(d=>String(d.id)===String(id)?{...d,duration:Math.max(0.5,Math.min(8,d.duration+delta))}:d)}));
          return(
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <div style={{fontSize:13,fontWeight:700,color:"#a1a1aa"}}>⏰ 日程スケジュール</div>
                <input type="date" value={scheduleDate} onChange={e=>setScheduleDate(e.target.value)} style={{marginLeft:"auto",background:"#18181b",border:"1px solid #27272a",borderRadius:8,color:"#e4e4e7",padding:"6px 10px",fontSize:13}}/>
              </div>
              <div style={{background:"#18181b",borderRadius:14,padding:14,border:"1px solid #27272a",marginBottom:12}}>
                <div style={{fontSize:12,fontWeight:600,color:"#71717a",marginBottom:10}}>📋 未配置の案件</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",minHeight:36}}>
                  {unscheduledJobs.length===0?<div style={{fontSize:12,color:"#3f3f46"}}>すべて配置済みです ✅</div>:unscheduledJobs.map(job=>{const cc=getColor(job.client);return(<div key={job.id} draggable onDragStart={()=>setSchDragging({job:{...job,duration:1},fromScheduled:false})} style={{background:cc.bg,border:`1px solid ${cc.border}`,borderRadius:8,padding:"6px 12px",cursor:"grab",userSelect:"none"}}><div style={{fontSize:12,fontWeight:700,color:cc.text}}>{job.product}</div><div style={{fontSize:10,color:"#71717a"}}>{job.client}</div></div>);})}
                </div>
              </div>
              <div style={{background:"#18181b",borderRadius:14,padding:14,border:"1px solid #27272a"}}>
                <div style={{position:"relative",height:20,marginBottom:4}}>
                  {SCH_TIME_LABELS.map((label,i)=><div key={i} style={{position:"absolute",left:`${(SCH_TIME_POS[i]/SCH_TOTAL)*100}%`,fontSize:10,color:label==="12:00"?"#f87171":"#52525b",transform:"translateX(-50%)",whiteSpace:"nowrap"}}>{label}</div>)}
                </div>
                <div id="sch-timeline" onDragOver={e=>e.preventDefault()} onDrop={handleSchDrop} style={{position:"relative",height:tlHeight,background:"#111113",borderRadius:10,border:`2px dashed ${schDragging?"#f97316":"#27272a"}`,overflow:"hidden",minHeight:80}}>
                  {SCH_TIME_POS.map((pos,i)=><div key={i} style={{position:"absolute",left:`${(pos/SCH_TOTAL)*100}%`,top:0,bottom:0,borderLeft:`1px solid ${SCH_TIME_LABELS[i]==="12:00"?"#7f1d1d50":"#27272a"}`,pointerEvents:"none"}}/>)}
                  {items.map(job=>{const cc=getColor(job.client);return(<div key={job.id} draggable onDragStart={()=>setSchDragging({job,fromScheduled:true})} style={{position:"absolute",left:`${schToPercent(job.startHour)}%`,width:`${(job.duration/SCH_TOTAL)*100}%`,top:8+job.row*(SCH_ROW_H+SCH_ROW_GAP),height:SCH_ROW_H,background:cc.bg,border:`2px solid ${cc.border}`,borderRadius:8,cursor:"grab",overflow:"hidden",userSelect:"none"}}><div style={{padding:"4px 8px"}}><div style={{fontSize:11,fontWeight:700,color:cc.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{job.product}</div><div style={{fontSize:10,color:"#a1a1aa"}}>{job.client}</div><div style={{fontSize:10,color:"#52525b"}}>{schFmtHour(job.startHour)}〜{schFmtHour(job.startHour+job.duration)}</div></div><div style={{position:"absolute",bottom:3,right:3,display:"flex",gap:2}}><button onClick={e=>{e.stopPropagation();changeSchDuration(job.id,-0.5);}} style={{background:"#27272a",border:"none",color:"#e4e4e7",borderRadius:4,width:18,height:18,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button><button onClick={e=>{e.stopPropagation();changeSchDuration(job.id,0.5);}} style={{background:"#27272a",border:"none",color:"#e4e4e7",borderRadius:4,width:18,height:18,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>＋</button><button onClick={e=>{e.stopPropagation();removeSchJob(job.id);}} style={{background:"#7f1d1d",border:"none",color:"#fca5a5",borderRadius:4,width:18,height:18,cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button></div></div>);})}
                </div>
              </div>
            </div>
          );
        })()}

        {/* 案件一覧 */}
        {tab===2&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {jobs.length===0&&<div style={{textAlign:"center",color:"#3f3f46",padding:40,border:"1px dashed #27272a",borderRadius:14}}>案件がありません</div>}
            {[...jobs].sort((a,b)=>(a.pickupDate||"").localeCompare(b.pickupDate||"")).map(job=><JobCard key={job.id} job={job}/>)}
          </div>
        )}

        {/* 見積 */}
        {tab===3&&(()=>{
          const qDisplayed=quoteFilter==="すべて"?jobs:jobs.filter(j=>j.quoteStatus===quoteFilter);
          const totalApproved=jobs.filter(j=>j.quoteStatus==="承認済").reduce((s,j)=>s+(Number(j.quoteAmount)||0),0);
          const totalQuoted=jobs.filter(j=>j.quoteStatus==="見積済").reduce((s,j)=>s+(Number(j.quoteAmount)||0),0);
          const unquotedCount=jobs.filter(j=>!j.quoteStatus||j.quoteStatus==="未見積").length;
          return(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
                {[{label:"未見積",value:`${unquotedCount}件`,color:"#94a3b8"},{label:"見積済合計",value:fmtMoney(totalQuoted),color:"#a78bfa"},{label:"承認済合計",value:fmtMoney(totalApproved),color:"#4ade80"}].map((s,i)=><div key={i} style={{background:"#18181b",borderRadius:12,padding:"12px 10px",border:"1px solid #27272a",textAlign:"center"}}><div style={{fontSize:10,color:"#52525b",marginBottom:4}}>{s.label}</div><div style={{fontSize:14,fontWeight:700,color:s.color}}>{s.value}</div></div>)}
              </div>
              <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
                {["すべて","未見積","見積済","承認済"].map(s=><button key={s} onClick={()=>setQuoteFilter(s)} style={{background:quoteFilter===s?"#27272a":"transparent",border:`1px solid ${quoteFilter===s?"#3f3f46":"#27272a"}`,color:quoteFilter===s?"#fafafa":"#52525b",borderRadius:20,padding:"5px 14px",fontSize:12,cursor:"pointer"}}>{s}</button>)}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {qDisplayed.map(job=>{const qs=QUOTE_STATUS_STYLE[job.quoteStatus||"未見積"];const cc=getColor(job.client);return(<div key={job.id} onClick={()=>{setQuoteSelected(job);setQuoteForm({quoteAmount:job.quoteAmount||"",quoteSpec:job.quoteSpec||"",quoteNote:job.quoteNote||""});}} style={{background:"#18181b",borderRadius:14,border:"1px solid #27272a",padding:"14px",cursor:"pointer",borderLeft:`3px solid ${cc.dot}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}><div style={{flex:1,paddingRight:8}}><div style={{fontSize:14,fontWeight:700,color:"#fafafa",marginBottom:2}}>{job.product}</div><div style={{fontSize:11,color:"#71717a"}}>🏢 {job.client}　📦 {job.qty}</div></div><button onClick={e=>{e.stopPropagation();updateField(job.id,"quoteStatus",QUOTE_STATUS_LIST[(QUOTE_STATUS_LIST.indexOf(job.quoteStatus||"未見積")+1)%3]);}} style={{background:qs.bg,border:`1px solid ${qs.border}`,color:qs.text,borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap",flexShrink:0}}><span style={{width:6,height:6,borderRadius:"50%",background:qs.dot,display:"inline-block"}}/>{job.quoteStatus||"未見積"}</button></div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:12,color:"#52525b"}}>{job.quoteSpec||"仕様未入力"}</div><div style={{fontSize:15,fontWeight:700,color:job.quoteAmount?"#f97316":"#3f3f46"}}>{fmtMoney(job.quoteAmount)}</div></div></div>);})}
              </div>
              {quoteSelected&&(
                <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"flex-end",zIndex:200}}>
                  <div style={{background:"#18181b",borderRadius:"18px 18px 0 0",padding:20,width:"100%",maxWidth:900,margin:"0 auto",border:"1px solid #27272a"}}>
                    <div style={{fontSize:15,fontWeight:700,color:"#fafafa",marginBottom:2}}>{quoteSelected.product}</div>
                    <div style={{fontSize:11,color:"#52525b",marginBottom:18}}>{quoteSelected.client}　{quoteSelected.qty}</div>
                    <div style={{marginBottom:12}}><div style={{fontSize:11,color:"#71717a",marginBottom:4}}>💴 見積金額（税抜）</div><input type="number" value={quoteForm.quoteAmount} onChange={e=>setQuoteForm({...quoteForm,quoteAmount:e.target.value})} placeholder="例：125000" style={{width:"100%",background:"#111113",border:"1px solid #3f3f46",borderRadius:9,padding:"11px 12px",color:"#e4e4e7",fontSize:16,outline:"none",fontFamily:"inherit"}}/></div>
                    <div style={{marginBottom:12}}><div style={{fontSize:11,color:"#71717a",marginBottom:4}}>📋 仕様</div><input value={quoteForm.quoteSpec} onChange={e=>setQuoteForm({...quoteForm,quoteSpec:e.target.value})} placeholder="例：無線綴じ・PPグロス加工" style={{width:"100%",background:"#111113",border:"1px solid #3f3f46",borderRadius:9,padding:"11px 12px",color:"#e4e4e7",fontSize:14,outline:"none",fontFamily:"inherit"}}/></div>
                    <div style={{marginBottom:20}}><div style={{fontSize:11,color:"#71717a",marginBottom:4}}>📝 備考</div><input value={quoteForm.quoteNote} onChange={e=>setQuoteForm({...quoteForm,quoteNote:e.target.value})} placeholder="例：送料別・税抜" style={{width:"100%",background:"#111113",border:"1px solid #3f3f46",borderRadius:9,padding:"11px 12px",color:"#e4e4e7",fontSize:14,outline:"none",fontFamily:"inherit"}}/></div>
                    <div style={{display:"flex",gap:10}}><button onClick={()=>setQuoteSelected(null)} style={{flex:1,padding:"13px",borderRadius:12,border:"1px solid #3f3f46",background:"transparent",color:"#71717a",fontSize:13,cursor:"pointer"}}>キャンセル</button><button onClick={()=>{updateField(quoteSelected.id,"quoteAmount",Number(quoteForm.quoteAmount)||0);updateField(quoteSelected.id,"quoteSpec",quoteForm.quoteSpec);updateField(quoteSelected.id,"quoteNote",quoteForm.quoteNote);setQuoteSelected(null);}} style={{flex:2,padding:"13px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#7c3aed,#6d28d9)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>保存する</button></div>
                  </div>
                </div>
              )}
            </div>
          );
        })()}

        {/* 機械/人員 */}
        {tab===4&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"#18181b",borderRadius:16,padding:16,border:"1px solid #27272a"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#a1a1aa",marginBottom:14}}>⚙ 機械稼働状況</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {machineLoad.map(m=><div key={m.name}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:"#d4d4d8"}}>{m.name}</span><span style={{fontSize:11,color:m.count>0?"#f97316":"#3f3f46"}}>{m.count>0?`${m.count}件稼働中`:"空き"}</span></div><div style={{height:6,background:"#27272a",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,width:m.count>0?"100%":"0%",background:"linear-gradient(90deg,#f97316,#ea580c)"}}/></div></div>)}
              </div>
            </div>
            <div style={{background:"#18181b",borderRadius:16,padding:16,border:"1px solid #27272a"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#a1a1aa",marginBottom:14}}>👤 人員配置状況</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {workerLoad.map(w=><div key={w.name} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"#111113",borderRadius:10,border:"1px solid #27272a"}}><div style={{width:36,height:36,borderRadius:"50%",flexShrink:0,background:w.jobs.length>0?"linear-gradient(135deg,#1d4ed8,#0284c7)":"#27272a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:w.jobs.length>0?"#fff":"#52525b"}}>{w.name[0]}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,color:"#d4d4d8"}}>{w.name}</div><div style={{fontSize:11,color:"#52525b",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{w.jobs.length>0?w.jobs.map(j=>j.product).join("・"):"未配置"}</div></div><div style={{fontSize:12,fontWeight:700,color:w.jobs.length>0?"#7dd3fc":"#3f3f46",flexShrink:0}}>{w.jobs.length>0?`${w.jobs.length}件`:"−"}</div></div>)}
              </div>
            </div>
          </div>
        )}

        {/* 登録 */}
        {tab===5&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <button onClick={()=>setShowAiImport(true)} style={{width:"100%",padding:"16px",borderRadius:14,border:"1px solid #7c3aed",background:"#1a1033",color:"#c4b5fd",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>📷 画像から自動入力（AI読み取り）</button>
            <div style={{borderTop:"1px solid #27272a",paddingTop:14}}>
              <div style={{fontSize:13,fontWeight:700,color:"#a1a1aa",marginBottom:12}}>📠 手動で登録</div>
              <div style={{background:"#18181b",borderRadius:18,padding:18,border:"1px solid #27272a"}}>
                {[{label:"取引先名 *",key:"client",placeholder:"例：服部プロセス"},{label:"品名・加工内容 *",key:"product",placeholder:"例：KOBECCO5月号"},{label:"数量",key:"qty",placeholder:"例：8,600部"},{label:"加工種類",key:"processType",placeholder:"例：無線綴じ・中綴じ・折り"},{label:"備考・特記事項",key:"note",placeholder:"例：PPグロス加工"}].map(f=>(
                  <div key={f.key} style={{marginBottom:12}}><div style={{fontSize:11,color:"#71717a",marginBottom:4}}>{f.label}</div><input value={form[f.key]} onChange={e=>setForm({...form,[f.key]:e.target.value})} placeholder={f.placeholder} style={{width:"100%",background:"#111113",border:"1px solid #3f3f46",borderRadius:9,padding:"11px 12px",color:"#e4e4e7",fontSize:14,outline:"none",fontFamily:"inherit"}}/></div>
                ))}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                  <div><div style={{fontSize:11,color:"#7dd3fc",marginBottom:4}}>🚚 引き取り日 *</div><input type="date" value={form.pickupDate} onChange={e=>setForm({...form,pickupDate:e.target.value})} style={{width:"100%",background:"#111113",border:"1px solid #1e3a5f",borderRadius:9,padding:"11px 10px",color:"#e4e4e7",fontSize:13,outline:"none"}}/></div>
                  <div><div style={{fontSize:11,color:"#4ade80",marginBottom:4}}>📬 納品日</div><input type="date" value={form.deliveryDate} onChange={e=>setForm({...form,deliveryDate:e.target.value})} style={{width:"100%",background:"#111113",border:"1px solid #166534",borderRadius:9,padding:"11px 10px",color:"#e4e4e7",fontSize:13,outline:"none"}}/></div>
                </div>
                <div style={{marginBottom:14}}><div style={{fontSize:11,color:"#71717a",marginBottom:8}}>使用機械（複数選択可）</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{MACHINES.map(m=><button key={m} onClick={()=>setForm({...form,machines:toggle(form.machines,m)})} style={{background:form.machines.includes(m)?"#431407":"#111113",border:`1px solid ${form.machines.includes(m)?"#ea580c":"#3f3f46"}`,color:form.machines.includes(m)?"#fb923c":"#71717a",borderRadius:8,padding:"7px 12px",fontSize:12,cursor:"pointer"}}>⚙ {m}</button>)}</div></div>
                <div style={{marginBottom:22}}><div style={{fontSize:11,color:"#71717a",marginBottom:8}}>担当者（複数選択可）</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{WORKERS.map(w=><button key={w} onClick={()=>setForm({...form,workers:toggle(form.workers,w)})} style={{background:form.workers.includes(w)?"#0c1a2e":"#111113",border:`1px solid ${form.workers.includes(w)?"#1d4ed8":"#3f3f46"}`,color:form.workers.includes(w)?"#7dd3fc":"#71717a",borderRadius:8,padding:"7px 12px",fontSize:12,cursor:"pointer"}}>👤 {w}</button>)}</div></div>
                <button onClick={handleAdd} disabled={!form.client||!form.product||!form.pickupDate} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:form.client&&form.product&&form.pickupDate?"linear-gradient(135deg,#f97316,#ea580c)":"#27272a",color:form.client&&form.product&&form.pickupDate?"#fff":"#52525b",fontSize:15,fontWeight:700,cursor:"pointer"}}>登録する</button>
              </div>
            </div>
          </div>
        )}

        {/* 設定 */}
        {tab===6&&(
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"#a1a1aa",marginBottom:16}}>⚙ Anthropic APIキー設定</div>
            <div style={{fontSize:12,color:"#71717a",marginBottom:12}}>AI読み取り機能を使うために必要です。</div>
            <input type="password" value={apiKey} onChange={e=>{setApiKey(e.target.value);localStorage.setItem("anthropic_api_key",e.target.value);}} placeholder="sk-ant-..." style={{width:"100%",background:"#18181b",border:"1px solid #27272a",borderRadius:10,padding:"12px 14px",color:"#e4e4e7",fontSize:13,fontFamily:"monospace",outline:"none",boxSizing:"border-box"}}/>
            {apiKey&&<div style={{marginTop:10,fontSize:12,color:"#4ade80"}}>✓ APIキーが設定されています</div>}
          </div>
        )}

        {/* 📝 業務日誌 */}
        {tab===7&&<NippoTab nippoRecords={nippoRecords} setNippoRecords={setNippoRecords} nippoHistView={nippoHistView} setNippoHistView={setNippoHistView} nippoSaved={nippoSaved} setNippoSaved={setNippoSaved} nippoTodayJobs={nippoTodayJobs} jobs={jobs} getColor={getColor} />}



      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:900,background:"#18181b",borderTop:"1px solid #27272a",display:"flex",zIndex:100}}>
        {TABS.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{flex:1,padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:tab===i?700:400,color:tab===i?"#f97316":"#52525b"}}>{t.label}</span>
            {tab===i&&<span style={{width:20,height:2,background:"#f97316",borderRadius:1}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
